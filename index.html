        // SAYFA YÜKLENİNCE ÇALIŞANLAR
        window.onload = function() {
            populateSidebar();
            
            const urlParams = new URLSearchParams(window.location.search);
            const urunSlug = urlParams.get('urun'); 
            
            if (urunSlug) {
                openProduct(urunSlug);
            } else {
                displayProducts(products);
            }
        };

        // YAN MENÜYÜ DOLDUR
        function populateSidebar() {
            const hPanel = document.getElementById('panel-hyundai');
            const kPanel = document.getElementById('panel-kia');

            hyundaiModels.forEach(m => {
                const btn = document.createElement('button');
                btn.innerText = m;
                btn.onclick = () => filterByModel(m);
                hPanel.appendChild(btn);
            });

            kiaModels.forEach(m => {
                const btn = document.createElement('button');
                btn.innerText = m;
                btn.onclick = () => filterByModel(m);
                kPanel.appendChild(btn);
            });
        }

        function togglePanel(id) {
            const panel = document.getElementById(id);
            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        }

        // FİLTRELEME
        function filterByModel(model) {
            closeProduct();
            const filtered = products.filter(p => p.category === model);
            document.getElementById('category-title').innerText = model + " Parçaları";
            displayProducts(filtered);
        }

        // ÜRÜNÜ İSİMLE AÇMA (SEO)
        function openProduct(slug) {
            const p = products.find(x => x.slug === slug);
            if(!p) return;

            document.getElementById('list-view').style.display = 'none';
            document.getElementById('main-sidebar').style.display = 'none';
            document.getElementById('product-detail-view').style.display = 'block';

            document.getElementById('d-title').innerText = p.title;
            document.getElementById('d-desc').innerText = p.desc;
            document.getElementById('d-main-img').src = p.images[0];
            
            const waMsg = `Merhaba, "${p.title}" ürünü için fiyat alabilir miyim?`;
            document.getElementById('d-whatsapp').href = `https://wa.me/905537383806?text=${encodeURIComponent(waMsg)}`;

            document.title = p.title + " | Cihat Hyundai";
            window.history.pushState({path: `?urun=${p.slug}`}, '', `?urun=${p.slug}`);
        }

        function displayProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.length ? "" : "<p>Ürün bulunamadı.</p>";
            items.forEach(p => {
                grid.innerHTML += `
                    <div class="card" onclick="openProduct('${p.slug}')">
                        <div class="card-img"><img src="${p.images[0]}"></div>
                        <div style="padding:15px;">
                            <small style="color:red;">${p.category}</small>
                            <h4 style="margin:5px 0;">${p.title}</h4>
                            <div class="btn-whatsapp" style="padding:5px; font-size:0.8rem; margin-top:10px;">İncele</div>
                        </div>
                    </div>`;
            });
        }

        function closeProduct() {
            document.getElementById('product-detail-view').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('main-sidebar').style.display = 'block';
            window.history.pushState({}, '', 'index.html');
        }

        function showAll() {
            closeProduct();
            document.getElementById('category-title').innerText = "Tüm Ürünler";
            displayProducts(products);
        }
    </script>
